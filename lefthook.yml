pre-commit:
  # Clippy and tests share Cargo's target directory. Running them concurrently
  # makes cold local builds contend for CPU, disk, and Cargo locks.
  parallel: false
  commands:
    rustfmt:
      glob: "**/*.rs"
      run: cargo fmt --all -- --check
    clippy:
      glob: "**/*.rs"
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
    unit:
      glob: "**/*.rs"
      run: cargo test --workspace --lib
pre-push:
  commands:
    test:
      run: cargo test --workspace
    clippy:
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
