name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Verify tag matches Rust package version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '[.packages[].version] | unique | if length == 1 then .[0] else "mixed" end')
          test "$VERSION" = "${TAG#v}"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      - run: cargo test --workspace --all-features --locked
      - run: npm test --prefix npm

  workflows-and-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 # 1.7.12
      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: ./scripts
      - uses: taiki-e/install-action@dd8818a5aa91f719916df68d974dfd9c95d29899 # cargo-machete
      - name: Audit unused Rust dependencies
        run: cargo machete --with-metadata

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            archive: tar.gz
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04-arm
            archive: tar.gz
            cross: false
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz
            cross: false
          - target: aarch64-apple-darwin
            os: macos-15
            archive: tar.gz
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            archive: zip
            cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install native musl linker
        if: ${{ !matrix.cross && contains(matrix.target, 'linux-musl') }}
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Release builds are independent matrix jobs. Persist Cargo artifacts so
      # later releases do not recompile the whole dependency graph from zero.
      - name: Cache native Rust compilation
        if: ${{ !matrix.cross }}
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Native jobs use sccache. The cross container cannot use the host
          # compiler wrapper, so retain Cargo target caching for that one job.
          cache-targets: ${{ matrix.cross }}

      - name: Install cross (portable Linux builds)
        if: matrix.cross
        # Download the published cross binary instead of compiling cross and its
        # dependency graph on every clean release runner.
        uses: taiki-e/install-action@8dee347fd60fc506e718944468a8a8aeb22fb4ef # cross

      - name: Build release with cross
        if: matrix.cross
        shell: bash
        run: cross build -p ravel-cli --release --locked --target ${{ matrix.target }}

      - name: Build native release
        if: ${{ !matrix.cross }}
        shell: bash
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          CC_aarch64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build -p ravel-cli --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          EXT=""
          if [[ "$TARGET" == *windows* ]]; then EXT=".exe"; fi
          BIN="target/${TARGET}/release/ravel${EXT}"
          test -f "$BIN"
          STAGING="ravel-${TARGET}"
          mkdir -p "$STAGING"
          cp "$BIN" "$STAGING/"
          cp README.md LICENSE* "$STAGING/" 2>/dev/null || true
          if [ "${{ matrix.archive }}" = "zip" ]; then
            ARCHIVE="$PWD/ravel-${TARGET}.zip"
            (cd "$STAGING" && 7z a "$ARCHIVE" ./*) || powershell Compress-Archive -Path "$STAGING/*" -DestinationPath "$ARCHIVE"
          else
            tar -czf "ravel-${TARGET}.tar.gz" -C "$STAGING" .
          fi
          ls -la ravel-${TARGET}.*

      - name: Smoke executable artifact
        shell: bash
        run: |
          rm -rf verify-artifact
          mkdir verify-artifact
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z x "ravel-${{ matrix.target }}.zip" -overify-artifact
          else
            tar -xzf "ravel-${{ matrix.target }}.tar.gz" -C verify-artifact
          fi
          verify-artifact/ravel${{ runner.os == 'Windows' && '.exe' || '' }} --version

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ravel-${{ matrix.target }}
          path: |
            ravel-*.tar.gz
            ravel-*.zip

  publish:
    # Keep static validation parallel with the expensive platform matrix, but
    # require both before any package or release becomes public.
    needs: [validate, workflows-and-shell, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: find dist -type f | sort

      - name: Generate release checksums
        working-directory: dist
        run: |
          for file in ./*.tar.gz ./*.zip; do
            printf '%s  %s\n' "$(sha256sum "$file" | cut -d ' ' -f 1)" "${file#./}"
          done > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/SHA256SUMS
          generate_release_notes: true

  publish-npm:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - name: Require NPM_TOKEN
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: test -n "$NPM_TOKEN" || { echo "::error::NPM_TOKEN is required for a stable release"; exit 1; }
      - name: Sync package version to tag
        working-directory: npm
        env:
          TAG: ${{ github.ref_name }}
        run: npm pkg set version="${TAG#v}"
      - name: Publish to npm
        working-directory: npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: "@guigaoliveira"
      - name: Sync package version to tag
        working-directory: npm
        env:
          TAG: ${{ github.ref_name }}
        run: npm pkg set version="${TAG#v}"
      - name: Publish to GitHub Packages
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
