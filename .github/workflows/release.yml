name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Release builds are independent matrix jobs. Persist Cargo artifacts so
      # later releases do not recompile the whole dependency graph from zero.
      - uses: Swatinem/rust-cache@v2

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build -p ravel-cli --release --locked --target ${{ matrix.target }}
          else
            cargo build -p ravel-cli --release --locked --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          EXT=""
          if [[ "$TARGET" == *windows* ]]; then EXT=".exe"; fi
          BIN="target/${TARGET}/release/ravel${EXT}"
          test -f "$BIN"
          STAGING="ravel-${TARGET}"
          mkdir -p "$STAGING"
          cp "$BIN" "$STAGING/"
          cp README.md LICENSE* "$STAGING/" 2>/dev/null || true
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "ravel-${TARGET}.zip" "$STAGING"/* || powershell Compress-Archive -Path "$STAGING/*" -DestinationPath "ravel-${TARGET}.zip"
          else
            tar -czf "ravel-${TARGET}.tar.gz" -C "$STAGING" .
          fi
          ls -la ravel-${TARGET}.*

      - uses: actions/upload-artifact@v4
        with:
          name: ravel-${{ matrix.target }}
          path: |
            ravel-*.tar.gz
            ravel-*.zip

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
          generate_release_notes: true

  publish-npm:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - name: Guard on NPM_TOKEN
        id: guard
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping npm publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Sync package version to tag
        if: steps.guard.outputs.skip != 'true'
        working-directory: npm
        env:
          TAG: ${{ github.ref_name }}
        run: npm pkg set version="${TAG#v}"
      - name: Publish to npm
        if: steps.guard.outputs.skip != 'true'
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: "@guigaoliveira"
      - name: Sync package version to tag
        working-directory: npm
        env:
          TAG: ${{ github.ref_name }}
        run: npm pkg set version="${TAG#v}"
      - name: Publish to GitHub Packages
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
