# Build and attach multi-platform ravel binaries on version tags (v*).
# Also runs on workflow_dispatch for dry-runs.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build -p ravel-cli --release --target ${{ matrix.target }}
          else
            cargo build -p ravel-cli --release --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          EXT=""
          if [[ "$TARGET" == *windows* ]]; then EXT=".exe"; fi
          BIN="target/${TARGET}/release/ravel${EXT}"
          test -f "$BIN"
          STAGING="ravel-${TARGET}"
          mkdir -p "$STAGING"
          cp "$BIN" "$STAGING/"
          cp README.md LICENSE* 2>/dev/null || true
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "ravel-${TARGET}.zip" "$STAGING"/* || powershell Compress-Archive -Path "$STAGING/*" -DestinationPath "ravel-${TARGET}.zip"
          else
            tar -czf "ravel-${TARGET}.tar.gz" -C "$STAGING" .
          fi
          ls -la ravel-${TARGET}.*

      - uses: actions/upload-artifact@v4
        with:
          name: ravel-${{ matrix.target }}
          path: |
            ravel-*.tar.gz
            ravel-*.zip

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publishes the npm wrapper AFTER the GitHub Release exists — its postinstall downloads the
  # release assets, so the npm version must equal the tag and the assets must already be up.
  # Requires an NPM_TOKEN repo secret; the job is a no-op-skip if it is absent.
  publish-npm:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Guard on NPM_TOKEN
        id: guard
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping npm publish." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Sync package version to tag
        if: steps.guard.outputs.skip != 'true'
        working-directory: npm
        env:
          TAG: ${{ github.ref_name }}
        run: npm pkg set version="${TAG#v}"
      - name: Publish to npm
        if: steps.guard.outputs.skip != 'true'
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
